version: 2

models:
  - name: int_encounter_diagnosis_bridge
    description: "Bridge table linking encounters to diagnoses."
    columns:
      - name: encounter_diagnosis_bridge_sk
        description: "Surrogate key for the encounter-diagnosis relationship."
        tests:
          - not_null
          - unique

      - name: diagnosis_sk
        description: "Diagnosis surrogate key."
        tests:
          - not_null

      - name: encounter_id
        description: "Encounter identifier."
        tests:
          - not_null

      - name: patient_id
        description: "Patient identifier."

      - name: icd_code
        description: "ICD-10 diagnosis code."
