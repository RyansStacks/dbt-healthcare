version: 2

models:
  - name: int_visits
    description: "Conformed visit entity representing sub-encounter visit segments."
    columns:
      - name: visit_sk
        description: "Surrogate key for the visit."
        tests:
          - not_null
          - unique

      - name: visit_id
        description: "Natural visit identifier."
        tests:
          - not_null

      - name: encounter_id
        description: "Encounter associated with the visit."

      - name: patient_id
        description: "Patient associated with the visit."

      - name: visit_type
        description: "Type of visit."

      - name: visit_start_datetime
        description: "Visit start timestamp."

      - name: visit_end_datetime
        description: "Visit end timestamp."

      - name: provider_id
        description: "Provider associated with the visit."

      - name: location
        description: "Location of the visit."

      - name: department
        description: "Department associated with the visit."

      - name: created_at
        description: "Record creation timestamp."

      - name: updated_at
        description: "Record last update timestamp."
