version: 2

models:
  - name: stg_visits
    description: "Staging model for visit-level data sourced from the raw EHR system."
    columns:

      - name: visit_sk
        description: "Surrogate key generated from visit_id."
        tests:
          - not_null
          - unique

      - name: visit_id
        description: "Natural key for the visit record."
        tests:
          - not_null

      - name: encounter_id
        description: "Foreign key linking the visit to the encounter."
        tests:
          - not_null
          - relationships:
              to: ref('stg_encounters')
              field: encounter_id

      - name: patient_id
        description: "Foreign key linking the visit to the patient."
        tests:
          - not_null
          - relationships:
              to: ref('stg_patients')
              field: patient_id

      - name: visit_type
        description: "Type of visit (e.g., inpatient, outpatient, ED)."

      - name: visit_start_datetime
        description: "Timestamp when the visit began."

      - name: visit_end_datetime
        description: "Timestamp when the visit ended."

      - name: provider_id
        description: "Identifier for the provider associated with the visit."

      - name: location
        description: "Location or facility where the visit occurred."

      - name: department
        description: "Department or unit associated with the visit."

      - name: created_at
        description: "Timestamp when the record was created in the source system."

      - name: updated_at
        description: "Timestamp when the record was last updated in the source system."
