version: 2

models:
  - name: fct_lab_results
    description: "Wide lab result fact table with normalized values and abnormality logic."
    columns:
      - name: lab_result_sk
        description: "Surrogate key for the lab result."
        tests:
          - not_null
          - unique

      - name: lab_result_id
        description: "Natural lab result identifier."

      - name: encounter_id
        description: "Encounter identifier."

      - name: patient_id
        description: "Patient identifier."

      - name: loinc_code
        description: "LOINC code."

      - name: test_name
        description: "Lab test name."

      - name: result_value
        description: "Result value."

      - name: result_unit
        description: "Unit of measurement."

      - name: abnormal_flag
        description: "Abnormal flag."

      - name: result_normalized
        description: "Normalized result value."

      - name: is_abnormal
        description: "Abnormal indicator."
